# pwnMyKali — kitty configuration

include color.ini

# Fonts (Nerd Font variant ships with the installer)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13

disable_ligatures never

# Cursor
cursor_shape          beam
cursor_beam_thickness 1.8

# Window
window_padding_width 0
background_opacity   0.92
hide_window_decorations yes

# Bell
enable_audio_bell no

# Performance
repaint_delay  10
input_delay    3
sync_to_monitor yes

# Mouse
mouse_hide_wait 3.0
detect_urls     yes
url_style       curly

# Tabs
tab_bar_style   powerline
tab_powerline_style slanted

# Shell
shell zsh

# Keybindings
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+z     toggle_layout stack

# Word / line motions matching readline
map ctrl+left  send_text all \x1b\x62
map ctrl+right send_text all \x1b\x66
map alt+left   send_text all \x01
map alt+right  send_text all \x05

# Scratch buffers
map F1 copy_to_buffer    a
map F2 paste_from_buffer a
map F3 copy_to_buffer    b
map F4 paste_from_buffer b
