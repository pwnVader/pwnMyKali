#
# pwnMyKali — minimal picom config tuned for VMware guests.
#
# Heavy effects (GLX backend, vsync, blur) are disabled on purpose:
# inside VMware the virtual GPU does not provide reliable OpenGL/vsync
# and triggers stalls in which the X server stops propagating damage
# events — symptom: typed characters / new windows appear only when
# another redraw is forced.
#
# If you are on bare metal with a real GPU and want eye-candy back:
#   backend = "glx";
#   vsync = true;
# and optionally enable blur-method = "dual_kawase".
#

# ── Backend ──────────────────────────────────────────────────────────────────
backend = "xrender";
vsync = false;
# use-damage = false on purpose: in VMware xrender, partial-repaint
# (damage events) leaves ghost silhouettes behind moving windows. The CPU
# cost of full repaints is negligible at this resolution and there are no
# more artifacts.
use-damage = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

# ── Rounded corners ─────────────────────────────────────────────────────────
# Available since picom v9. Polybar and dock-type windows are excluded so
# the bar stays flush with the screen edge.
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'"
];

# ── Shadows ──────────────────────────────────────────────────────────────────
# Disabled inside VMware xrender. Even small shadows traced ghost silhouettes
# behind moving / focus-changing windows. On bare metal feel free to flip
# shadow = true; for a softer look.
shadow = false;

# ── Fading ───────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;
fade-delta = 5;
no-fading-openclose = false;

# ── Transparency / opacity ──────────────────────────────────────────────────
inactive-opacity = 1.0;
frame-opacity   = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
# No per-window opacity rule from picom: kitty already handles its own
# transparency via background_opacity in kitty.conf, which only affects the
# background (text stays fully opaque and readable). Stacking both layers
# made text look ghostly on busy wallpapers when the pointer left the window.
opacity-rule = [ ];

# ── Window-type defaults ─────────────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true; shadow = false; opacity = 0.9;  focus = true;  full-shadow = false; };
    dock          = { shadow = false; clip-shadow-above = true; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
    normal        = { shadow = true; };
    notification  = { shadow = false; };
    splash        = { shadow = false; };
    utility       = { shadow = false; };
    menu          = { shadow = false; };
};
